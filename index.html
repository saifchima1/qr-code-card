<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    body{
      background-color: rgb(170, 214, 255);
    }
    .card{
      display: grid;
      
      align-items:center;
      width: 250px;
      height: 350px;
      background-color: rgb(255, 255, 255);
      border-radius: 5%;
      margin: auto;
      margin-top: 20%;
    }
    .qr{
      padding-top: 5%;
      padding-left: 6%;
      padding-right: 6%;
      border-radius: 30px;
    }
    h2, p{
      font-family:"Outfit", sans-serif;
      padding-top: 0%;
      padding-left: 0%;
      padding-right: 0%;
      font-size:100%;
      text-align: center;
    }
    .smalltext{
      font-family:"Outfit", sans-serif;
      padding-top: 0%;
      padding-left: 10%;
      padding-right: 10%;
      font-size: 90%;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="images/image-qr-code.png" height="222px" class="qr" alt="qr code">

    <h2>Improve your front-end skills by building projects</h2>

    <p1 class="smalltext">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p1>
  </div>
</body>
</html>
